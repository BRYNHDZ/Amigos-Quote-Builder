<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amigo Landscaping — Quote Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@700&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;font-size:14px;background:#F3F4F6;color:#18240F;min-height:100vh}
.wrap{max-width:1100px;margin:0 auto;padding:16px}
header{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 16px;background:#fff;border:1px solid #e0dfd8;border-radius:12px;margin-bottom:16px}
.logo{width:34px;height:34px;background:#30471F;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
h1{font-family:'Fredoka',sans-serif;font-size:19px;font-weight:700;color:#18240F}
.sub{font-size:11px;color:#888;margin-top:1px}
.dl-btn{background:#FFB300;color:#18240F;border:none;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;white-space:nowrap;flex-shrink:0}
.dl-btn:hover{background:#e6a200}
.card{background:#fff;border:1px solid #e0dfd8;border-radius:12px;padding:14px 16px;margin-bottom:10px}
.slbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#30471F;margin-bottom:10px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px 12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px 12px}
.lbl{display:block;font-size:11px;font-weight:700;color:#555;margin-bottom:3px}
input[type=number]{width:100%;font-size:13px;padding:7px 9px;border:1.5px solid #d8d8d0;border-radius:7px;background:#fafaf8;color:#18240F;outline:none;font-family:'Nunito',sans-serif}
input[type=number]:focus{border-color:#30471F;box-shadow:0 0 0 2px rgba(48,71,31,.1)}
.hint{font-size:10px;color:#aaa;margin-top:2px}
.seg{display:flex;border:1.5px solid #d8d8d0;border-radius:8px;overflow:hidden;background:#F3F4F6}
.seg button{flex:1;padding:7px 4px;font-size:11px;font-weight:700;cursor:pointer;background:transparent;border:none;border-right:1px solid #e0dfd8;color:#888;transition:all .12s;font-family:'Nunito',sans-serif}
.seg button:last-child{border-right:none}
.seg button.on{background:#30471F;color:#fff}
.warn{background:#fffbec;border:1.5px solid #FFB300;border-radius:7px;padding:7px 10px;font-size:11px;color:#7a5800;margin-top:8px}
.layout{display:grid;grid-template-columns:minmax(0,1fr) 280px;gap:12px;align-items:start}
@media(max-width:700px){.layout{grid-template-columns:1fr}.g2{grid-template-columns:1fr}.g3{grid-template-columns:1fr 1fr}}
.cat-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.cat-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#30471F}
.atag{font-size:10px;padding:1px 6px;border-radius:20px;background:#e6f0e0;color:#30471F;font-weight:700}
.svc{display:flex;align-items:center;gap:7px;padding:6px 0;border-bottom:1px solid #f5f5f0;cursor:pointer;user-select:none}
.svc:last-child{border-bottom:none}
.chk{width:16px;height:16px;border-radius:4px;border:1.5px solid #d8d8d0;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:#fff;transition:all .12s}
.chk.on{background:#30471F;border-color:#30471F}
.chk.dis{opacity:.3;cursor:not-allowed}
.svc-info{flex:1;min-width:0}
.svc-nm{font-size:12px;font-weight:700;color:#18240F;line-height:1.3;display:flex;align-items:center;flex-wrap:wrap;gap:4px}
.svc-nm.dim{color:#bbb}
.svc-desc{font-size:11px;color:#888;line-height:1.4;margin-top:2px;display:none}
.svc-desc.open{display:block}
.pop{font-size:10px;padding:1px 6px;border-radius:20px;background:#FFB300;color:#18240F;font-weight:700}
.req{font-size:10px;color:#bbb;font-weight:400}
.pi{width:74px;font-size:12px;padding:5px 6px;border:1.5px solid #d8d8d0;border-radius:6px;text-align:right;background:#fafaf8;color:#18240F;font-family:'Nunito',sans-serif;flex-shrink:0}
.exp{font-size:10px;color:#aaa;cursor:pointer;padding:1px 4px;border-radius:4px;border:1px solid #e8e8e0;background:#fafaf8;flex-shrink:0;margin-left:2px}
.exp:hover{background:#f0f0ea}
.sticky{position:sticky;top:10px}
.met{background:#F3F4F6;border-radius:8px;padding:10px 12px}
.met-l{font-size:10px;color:#888;margin-bottom:1px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.met-v{font-size:22px;font-weight:700;color:#18240F;font-family:'Fredoka',sans-serif}
.qhd{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#30471F;padding:5px 0 4px;margin:5px 0 4px;border-bottom:1px solid #f0f0ea}
.jh{background:#f5f9f4;border:1px solid #d8e8d0;border-radius:8px;padding:9px;margin-bottom:6px}
.jh-title{font-size:11px;font-weight:700;color:#30471F}
.jh-desc{font-size:10px;color:#5a7a50;line-height:1.45;margin:2px 0 5px}
.jh-tag{font-size:9px;color:#888;font-style:italic}
.qi{background:#F3F4F6;border-radius:8px;padding:9px;margin-bottom:6px}
.qi-nm{font-size:11px;font-weight:700;color:#18240F}
.qi-desc{font-size:10px;color:#666;line-height:1.45;margin:2px 0 6px}
.qi-pr{font-size:13px;color:#30471F;font-weight:700;font-family:'Fredoka',sans-serif}
.qi-btns{display:flex;gap:3px;margin-top:5px;padding-top:5px;border-top:1px solid #e8e8e0}
.qb{flex:1;font-size:10px;padding:4px 0;cursor:pointer;background:#fff;border:1px solid #e0dfd8;border-radius:5px;color:#555;text-align:center;font-family:'Nunito',sans-serif;font-weight:700}
.qb:hover{background:#f5f5f0}
.qb.g{background:#FFB300;color:#18240F;border-color:#FFB300}
.cp-all{width:100%;padding:11px;background:#FFB300;color:#18240F;font-size:13px;font-weight:700;border:none;border-radius:8px;cursor:pointer;margin-top:8px;font-family:'Fredoka',sans-serif}
.cp-all:hover{background:#e6a200}
.info{padding:7px 9px;background:#F3F4F6;border-radius:7px;font-size:11px;margin-top:7px}
.empty{text-align:center;padding:16px 0;font-size:11px;color:#bbb}
.bed-hint{font-size:10px;color:#aaa;margin-top:6px;padding-top:6px;border-top:1px dashed #e8e8e0}
</style>
</head>
<body>
<div class="wrap">
<header>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="logo"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
    <div><h1>Amigo Landscaping — Quote Builder</h1><div class="sub">Property details → auto-price → select services → copy to Jobber</div></div>
  </div>
</header>
<div class="card">
  <div class="slbl">Property details</div>
  <div class="g2" style="margin-bottom:12px">
    <div><label class="lbl">Lawn / turf (sq ft)</label><input type="number" id="iLn" placeholder="e.g. 8000" oninput="upd()"></div>
    <div><label class="lbl">Lot size (sq ft)</label><input type="number" id="iLt" placeholder="e.g. 10890" oninput="upd()"></div>
    <div><label class="lbl">Paved area — driveway + walks (sq ft)</label><input type="number" id="iPv" placeholder="e.g. 800" oninput="upd()"></div>
    <div><label class="lbl">Mulch — eyeball (yards)</label><input type="number" id="iMu" placeholder="e.g. 3" step="0.5" oninput="upd()"><div class="hint">Drives bed maintenance + mulch pricing</div></div>
    <div><label class="lbl">Bush trim time per visit (hrs)</label><input type="number" id="iTr" placeholder="e.g. 1.5" step="0.25" oninput="upd()"></div>
    <div><label class="lbl">Perennial pruning per session (hrs)</label><input type="number" id="iPe" placeholder="e.g. 0.5" step="0.25" oninput="upd()"></div>
  </div>
  <div class="g3">
    <div><label class="lbl" style="margin-bottom:5px">Man-hour rate</label>
      <div class="seg" id="rPg">
        <button class="on" onclick="sb('rPg',this,()=>ST.rate=80)">$80/hr</button>
        <button onclick="sb('rPg',this,()=>ST.rate=90)">$90/hr</button>
        <button onclick="sb('rPg',this,()=>ST.rate=100)">$100/hr</button>
      </div>
    </div>
    <div><label class="lbl" style="margin-bottom:5px">Leaf volume (0=none · 5=heavy)</label>
      <div class="seg" id="lPg">
        <button onclick="sb('lPg',this,()=>ST.leaf=0)">0</button>
        <button onclick="sb('lPg',this,()=>ST.leaf=1)">1</button>
        <button class="on" onclick="sb('lPg',this,()=>ST.leaf=2)">2</button>
        <button onclick="sb('lPg',this,()=>ST.leaf=3)">3</button>
        <button onclick="sb('lPg',this,()=>ST.leaf=4)">4</button>
        <button onclick="sb('lPg',this,()=>ST.leaf=5)">5</button>
      </div>
    </div>
    <div><label class="lbl" style="margin-bottom:5px">Snow trigger</label>
      <div class="seg" id="snPg">
        <button class="on" onclick="sb('snPg',this,()=>ST.snow='2plus')">2&quot;+</button>
        <button onclick="sb('snPg',this,()=>ST.snow='1plus')">1&quot;+</button>
        <button onclick="sb('snPg',this,()=>ST.snow='zero')">Zero tolerance</button>
      </div>
    </div>
  </div>
  <div id="estW" style="display:none" class="warn">No lawn size — estimating turf at 70% of lot.</div>
</div>
<div class="layout"><div id="svcCol"></div><div class="sticky" id="outCol"></div></div>
</div>
<script>
const $=id=>document.getElementById(id);
const V=35,BCB=100,BCR1=38,BCR2=26,BEB=200,BER1=60,BER2=40;
const SLM=[0.75,0.9,1.0,1.15,1.30,1.50];
let ST={lawn:0,lot:0,paved:0,mulch:0,trim:0,peren:0,rate:80,leaf:2,snow:'2plus',sel:new Set(['A1']),ov:{},exp:new Set()};
const MKT={A:{title:'🌿 Mowing Packages',desc:'Our weekly mowing packages provide consistent, professional care for your lawn throughout the entire growing season.'},C:{title:'🌸 Flower Bed Care',desc:'Keep your landscape beds pristine all season long. Choose between routine mechanical trimming or detailed hand-pulling and weed prevention.'},B:{title:'🌱 Lawn Health Services',desc:'Treatments designed to relieve soil compaction, improve nutrient uptake, and thicken your existing turf.'},D:{title:'🌱 Spring Property Cleanup',desc:'Comprehensive property care designed to properly reset and prepare your landscape at the start of the season.'},G:{title:'🍂 Fall Leaf Care & Cleanups',desc:'Comprehensive property care designed to manage falling leaves and prepare your landscape for winter.'},E:{title:'✂️ Trimming & Pruning',desc:'Professional shaping services to maintain neat, balanced bushes throughout the growing season.'},F:{title:'🪵 Mulch Services',desc:'Delivery and installation of natural dark brown mulch to refresh and define your existing landscape beds.'},H:{title:'❄️ Winter Services',desc:'Reliable, 24/7 snow and ice management to keep your property safe and accessible all winter long.'}};
const DESCS={A1:'Weekly professional mowing of all turf areas during the growing season (35 visits, April–November). Using specialized mulching blades, grass clippings are finely shredded and returned to the lawn to naturally feed the soil. Includes string trimming around edges, obstacles, and beds, and blowing of hard surfaces.',A2:'Weekly professional mowing (35 visits). Grass clippings are bagged and removed for a consistently clean appearance. Includes string trimming, edges, obstacles, beds, and blowing of hard surfaces.',C1:'Routine maintenance of garden beds using string trimmers to control visible weed growth. Performed during regular weekly visits. Mechanical trim only — no hand pulling; root systems remain intact.',C2:'Ongoing hand-pulled weeding and light bed upkeep performed during regular weekly visits. Includes an application of Preen weed preventer to prevent new weeds from sprouting.',B1:'Mechanical core aeration performed in spring to relieve soil compaction and improve air, water, and nutrient movement into the root zone.',B2:'Mechanical core aeration performed in fall to reduce compaction following the growing season and support root health heading into winter.',B3:'Application of grass seed in spring to improve turf density and strengthen existing lawn coverage. Intended to thicken existing turf — not designed to restore large bare or damaged areas.',B4:'Application of grass seed in fall to increase turf density and improve lawn thickness for the following season.',D1:'Seasonal cleanup in early spring to reset the property after winter. All organic material is finely shredded and returned to the soil to recycle nutrients naturally.',D2:'Seasonal cleanup in early spring. All collected material is completely hauled away for a perfectly clean appearance.',G1:'Add-on to mowing plan. Leaves are shredded and mulched into the turf during fall visits. Includes a deep end-of-season cleanup to clear excess leaf cover.',G2:'Add-on to mowing plan. Leaves collected and hauled away during every fall visit. Season concludes with a comprehensive full-property final cleanup.',G3:'Add-on to mowing plan. Most comprehensive — leaves completely cleared from lawn, hardscapes, and all flower beds during every visit. All material hauled away.',G4:'Single comprehensive property cleanup. Leaves, sticks, and debris cleared. All organic material finely shredded and returned to the soil.',G5:'Single comprehensive property cleanup. Leaves, sticks, and debris cleared. All collected material completely hauled away.',E1:'One professional trimming visit per year. Restores a neat, balanced shape. Ground level only — tree work not included.',E4:'Two professional trimming visits per year. Recommended for faster-growing landscapes. Ground level only — tree work not included.',E2:'Ongoing trimming support throughout the season as needed. Add-on to mowing plan. Ground level only.',E5:'Upgrades shaping services to include step ladders for taller bushes. Tree work remains excluded.',E3:'Seasonal pruning of perennial flowers at appropriate times. Does not include bush or tree trimming.',F1:'Delivery and installation of dark brown mulch in flower beds. Includes natural edge-defining and complimentary Preen weed preventer. $150/yard.',H1:'24/7 snow clearing triggered after ~2 inches. Unlimited visits for qualifying events. Covers driveways and walkways.',H2:'Priority 24/7 snow clearing triggered after ~1 inch. Earlier dispatch and priority scheduling.',H4:'Highest priority 24/7 snow clearing at any accumulation. Property remains completely clear at all times.',H3:'Application of salt to walkways and driveways following snow removal to improve traction and reduce icing.'};
const CATS=[{id:'A',items:[{id:'A1',name:'Weekly Maintenance – Nutrient Standard',pop:true},{id:'A2',name:'Weekly Maintenance – Pristine Standard',auto:true}]},{id:'C',addon:'add-on to mowing',items:[{id:'C1',name:'Garden Maintenance – Clean Look Plan',pop:true,dep:true},{id:'C2',name:'Garden Maintenance – Estate Detail Plan',dep:true}]},{id:'B',items:[{id:'B1',name:'Spring Aeration'},{id:'B2',name:'Fall Aeration'},{id:'B3',name:'Spring Overseeding'},{id:'B4',name:'Fall Overseeding'}]},{id:'D',items:[{id:'D1',name:'Spring Cleanup – Nutrient Standard',pop:true},{id:'D2',name:'Spring Cleanup – Pristine Standard'}]},{id:'G',addon:'add-on to mowing',items:[{id:'G1',name:'Leaf Care – Standard',pop:true,dep:true},{id:'G2',name:'Leaf Care – Pristine',dep:true},{id:'G3',name:'Leaf Care – Estate',dep:true},{id:'G4',name:'One-Time Cleanup – Nutrient Standard',pop:true},{id:'G5',name:'One-Time Cleanup – Pristine Standard'}]},{id:'E',items:[{id:'E1',name:'Annual Shaping'},{id:'E4',name:'Bi-Annual Shaping'},{id:'E2',name:'Premium Managed Shaping',dep:true},{id:'E5',name:'Ladder Use Upgrade'},{id:'E3',name:'Perennial Flower Pruning'}]},{id:'F',items:[{id:'F1',name:'Mulch Installation & Flower Bed Edging'}]},{id:'H',items:[{id:'H1',name:'Snow Removal – Standard'},{id:'H2',name:'Snow Removal – Premium'},{id:'H4',name:'Snow Removal – Zero Tolerance'},{id:'H3',name:'Salt Treatment'}]}];
const MDEPS=['C1','C2','G1','G2','G3','E2'];
function isMow(){return ST.sel.has('A1')||ST.sel.has('A2')}
function bp(y,b,r1,r2){return b+Math.min(y,8)*r1+Math.max(y-8,0)*r2;}
function getSug(){let{paved,mulch,trim,peren,rate,leaf,snow}=ST;let lawn=ST.lawn,lot=ST.lot;if(!lawn&&lot)lawn=lot*0.7;let mc=0;if(lawn>0){if(lawn<=5000)mc=40;else if(lawn<=10000)mc=40+(lawn-5000)*0.0019;else if(lawn<=20000)mc=49.5+(lawn-10000)*0.0015;else mc=64.5+(lawn-20000)*0.0012;}const mY=Math.round(mc*V);const c1=mulch>0?Math.round(bp(mulch,BCB,BCR1,BCR2)):mc>0?Math.round(mc*3):0;const c2=mulch>0?Math.round(bp(mulch,BEB,BER1,BER2)):mc>0?Math.round(mc*5):0;let fb=0;if(lot>0&&leaf>0){const b=lot<=10000?275:lot<=20000?275+(lot-10000)*0.011:lot<=43560?385+(lot-20000)*0.007:550+(lot-43560)*0.006;fb=b*(1+[0,0,0.25,0.5,0.8,1.2][leaf]);}const scBase=lot>0?(lot<=10000?200:lot<=20000?200+(lot-10000)*0.008:lot<=43560?280+(lot-20000)*0.005:420+(lot-43560)*0.004):0;const sc=Math.round(scBase*SLM[leaf]);let snb=paved>0?(paved<=600?695:695+(paved-600)*0.27):0;if(snow==='1plus')snb*=1.4;if(snow==='zero')snb*=2.0;return{A1:mY,A2:Math.round(mY*1.25),C1:c1,C2:c2,B1:mc>0?Math.round(mc*3.5):0,B2:mc>0?Math.round(mc*3.5):0,B3:mc>0&&lawn>0?Math.round(mc+lawn*0.02):0,B4:mc>0&&lawn>0?Math.round(mc+lawn*0.02):0,D1:sc,D2:Math.round(sc*1.2),G1:Math.round(fb),G2:Math.round(fb*1.35),G3:Math.round(fb*1.7),G4:Math.round(fb*0.65),G5:Math.round(fb*0.65*1.2),E1:trim>0?Math.round(trim*rate):0,E4:trim>0?Math.round(trim*rate*2):0,E2:trim>0?Math.round(trim*rate*6):0,E5:trim>0?Math.round(trim*rate*0.3):0,E3:peren>0?Math.round(peren*rate*2):0,F1:mulch>0?Math.round(mulch*150):0,H1:Math.round(snb),H2:Math.round(snb),H4:Math.round(snb),H3:paved>0?Math.round(100+(paved>600?(paved-600)*0.05:0)):0};}
function gp(id){if(id==='A2'){const b='A1'in ST.ov?ST.ov.A1:(getSug().A1||0);return Math.round(b*1.25);}return id in ST.ov?ST.ov[id]:(getSug()[id]||0);}
function tot(){let s=0;ST.sel.forEach(id=>s+=gp(id));return s;}
function toggle(id,cid){if(MDEPS.includes(id)&&!isMow())return;if(ST.sel.has(id)){ST.sel.delete(id);if(cid==='A'&&!isMow())MDEPS.forEach(d=>ST.sel.delete(d));}else ST.sel.add(id);render();}
function toggleExp(id,e){e.stopPropagation();ST.exp.has(id)?ST.exp.delete(id):ST.exp.add(id);render();}
function sb(gid,btn,fn){document.querySelectorAll('#'+gid+' button').forEach(b=>b.classList.remove('on'));btn.classList.add('on');fn();render();}
function upd(){ST.lawn=parseFloat($('iLn').value)||0;ST.lot=parseFloat($('iLt').value)||0;ST.paved=parseFloat($('iPv').value)||0;ST.mulch=parseFloat($('iMu').value)||0;ST.trim=parseFloat($('iTr').value)||0;ST.peren=parseFloat($('iPe').value)||0;render();}
function ovr(id,val){const n=parseFloat(val);if(isNaN(n)||val==='')delete ST.ov[id];else ST.ov[id]=n;renderOut();}
function cp(t,btn){navigator.clipboard.writeText(t).then(()=>{if(btn){const o=btn.textContent;btn.textContent='✓';setTimeout(()=>btn.textContent=o,1400);}}).catch(()=>{});}
function cpItem(id,what,btn){let t='';for(const cat of CATS){const item=cat.items.find(i=>i.id===id);if(item){const mo=Math.round(gp(id)/12);if(what==='n')t=item.name;else if(what==='d')t=DESCS[id]||'';else t=item.name+'\n'+(DESCS[id]||'')+'\n\n$'+mo+'/month';break;}}cp(t,btn);}
function cpHeader(id,btn){const m=MKT[id];if(m)cp(m.title+'\n\n'+m.desc,btn);}
function cpAll(btn){const lines=[];for(const cat of CATS){const sel=cat.items.filter(i=>ST.sel.has(i.id));if(!sel.length)continue;const m=MKT[cat.id];if(m){lines.push(m.title);lines.push('');lines.push(m.desc);lines.push('');}sel.forEach(item=>{lines.push(item.name);lines.push(DESCS[item.id]||'');lines.push('$'+Math.round(gp(item.id)/12)+'/month');lines.push('');});}const t=tot();if(t>0){lines.push('---');lines.push('Annual total: $'+Math.round(t).toLocaleString());lines.push('Monthly (12-mo): $'+Math.round(t/12).toLocaleString());}cp(lines.join('\n'),btn);}
function renderSvc(){const sug=getSug();let h='';for(const cat of CATS){const m=MKT[cat.id];h+='<div class="card"><div class="cat-hd"><div class="cat-title">'+(m?m.title:cat.id)+'</div>'+(cat.addon?'<span class="atag">'+cat.addon+'</span>':'')+'</div>';for(const item of cat.items){const sel=ST.sel.has(item.id),dis=MDEPS.includes(item.id)&&!isMow();const p=gp(item.id),sp=sug[item.id]||0,isExp=ST.exp.has(item.id);const chk=sel&&!dis?'<svg width="10" height="10" viewBox="0 0 12 12"><polyline points="1,6.5 4.5,10 11,2" stroke="white" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>':'';h+='<div class="svc" onclick="'+(dis?'':' toggle(\''+item.id+'\',\''+cat.id+'\')' )+'" style="'+(dis?'cursor:default':'')+'"><div class="chk '+(sel&&!dis?'on':'')+(dis?' dis':'')+'">'+chk+'</div><div class="svc-info"><div class="svc-nm'+(dis?' dim':'')+'">'+item.name+(item.pop?'<span class="pop">Popular</span>':'')+(dis?'<span class="req"> · requires mowing plan</span>':'')+'</div>';if(isExp)h+='<div class="svc-desc open">'+(DESCS[item.id]||'')+'</div>';h+='</div><button class="exp" onclick="toggleExp(\''+item.id+'\',event)">'+(isExp?'▲':'▼')+'</button>';if(item.auto){h+='<div style="text-align:right;font-size:12px;min-width:72px"><div style="font-weight:700;color:#30471F">$'+Math.round(p).toLocaleString()+'</div><div style="font-size:10px;color:#aaa">+25% auto</div></div>';}else{h+='<input class="pi" type="number" value="'+(p>0?Math.round(p):'')+'" placeholder="'+(sp>0?Math.round(sp):'—')+'" onclick="event.stopPropagation()" oninput="event.stopPropagation();ovr(\''+item.id+'\',this.value)">';}h+='</div>';}if(cat.id==='C'&&ST.mulch>0)h+='<div class="bed-hint">Clean Look = $'+BCB+' + $'+BCR1+'/yd (first 8) + $'+BCR2+'/yd beyond  ·  Estate = $'+BEB+' + $'+BER1+'/yd + $'+BER2+'/yd beyond  ·  '+ST.mulch+' yds</div>';if(cat.id==='D')h+='<div class="bed-hint">Spring cleanup scales with leaf volume — leaf '+ST.leaf+' → ×'+SLM[ST.leaf]+'</div>';h+='</div>';}$('svcCol').innerHTML=h;}
function renderOut(){const t=tot();let h='<div class="card" style="margin-bottom:10px"><div class="slbl">Summary</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div class="met"><div class="met-l">Annual total</div><div class="met-v">'+(t>0?'$'+Math.round(t).toLocaleString():'—')+'</div></div><div class="met"><div class="met-l">Monthly ÷12</div><div class="met-v">'+(t>0?'$'+Math.round(t/12).toLocaleString():'—')+'</div></div></div>';const trimSel=['E1','E4','E2'].filter(id=>ST.sel.has(id));if(trimSel.length&&ST.trim>0){const vM={E1:1,E4:2,E2:6};let tT=0,tH=0;trimSel.forEach(id=>{tT+=gp(id);tH+=ST.trim*(vM[id]||1);});const ir=tH>0?Math.round(tT/tH):0,ok=Math.abs(ir-ST.rate)<10,lo=ir<ST.rate-10;const cl=ok?'#30471F':lo?'#cc0000':'#7a5800';h+='<div class="info"><span style="color:#888">Trim rate: </span><span style="font-weight:700;color:'+cl+'">$'+ir+'/hr · '+(lo?'below target':ok?'on target':'above target')+'</span><span style="color:#888"> (target $'+ST.rate+'/hr)</span></div>';}if(ST.mulch>0&&ST.sel.has('F1')){const p=gp('F1'),cost=Math.round(ST.mulch*30),margin=p-cost;h+='<div class="info"><span style="color:#888">Mulch: </span><span style="font-weight:700">$'+Math.round(p).toLocaleString()+'</span><span style="color:#888"> · $'+cost+' material · </span><span style="color:#30471F;font-weight:700">$'+margin+' margin</span></div>';}h+='<button class="cp-all" onclick="cpAll(this)">Copy all line items</button></div>';h+='<div class="card"><div class="slbl">Jobber line items</div>';let any=false;for(const cat of CATS){const sel=cat.items.filter(i=>ST.sel.has(i.id));if(!sel.length)continue;any=true;const m=MKT[cat.id];if(m)h+='<div class="jh"><div style="display:flex;justify-content:space-between;align-items:start;gap:6px"><div><div class="jh-title">'+m.title+'</div><div class="jh-desc">'+m.desc+'</div></div><button class="qb" style="flex-shrink:0;width:52px" onclick="cpHeader(\''+cat.id+'\',this)">Copy</button></div><div class="jh-tag">$0 marketing header — paste into Jobber quote description</div></div>';h+='<div class="qhd">'+(m?m.title.replace(/^\S+\s/,''):cat.id)+'</div>';sel.forEach(item=>{const p=gp(item.id);h+='<div class="qi"><div class="qi-nm">'+item.name+'</div><div class="qi-desc">'+(DESCS[item.id]||'')+'</div><div class="qi-pr">$'+Math.round(p/12)+'/month</div><div class="qi-btns"><button class="qb" onclick="cpItem(\''+item.id+'\',\'n\',this)">Name</button><button class="qb" onclick="cpItem(\''+item.id+'\',\'d\',this)">Desc</button><button class="qb g" onclick="cpItem(\''+item.id+'\',\'a\',this)">All</button></div></div>';});}if(!any)h+='<div class="empty">Select services to see line items</div>';h+='</div>';$('outCol').innerHTML=h;}
function render(){$('estW').style.display=(!ST.lawn&&ST.lot)?'block':'none';renderSvc();renderOut();}
render();
</script>
