<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amigo Landscaping — Quote Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@700&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;font-size:14px;background:#F3F4F6;color:#18240F;min-height:100vh}
.wrap{max-width:1100px;margin:0 auto;padding:16px}
header{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 16px;background:#fff;border:1px solid #e0dfd8;border-radius:12px;margin-bottom:14px;flex-wrap:wrap}
.logo{width:32px;height:32px;background:#30471F;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.h1t{font-family:'Fredoka',sans-serif;font-size:17px;font-weight:700;color:#18240F}
.sub{font-size:11px;color:#888}
.mode-bar{display:flex;background:#fff;border:1px solid #e0dfd8;border-radius:12px;padding:6px;margin-bottom:14px;gap:6px}
.mode-btn{flex:1;padding:10px 8px;border:none;border-radius:8px;font-family:'Fredoka',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s;background:transparent;color:#888}
.mode-btn.on{background:#30471F;color:#fff}
.card{background:#fff;border:1px solid #e0dfd8;border-radius:12px;padding:14px 16px;margin-bottom:10px}
.slbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#30471F;margin-bottom:10px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px 12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px 12px}
.lbl{display:block;font-size:11px;font-weight:700;color:#555;margin-bottom:3px}
input[type=number]{width:100%;font-size:13px;padding:7px 9px;border:1.5px solid #d8d8d0;border-radius:7px;background:#fafaf8;color:#18240F;outline:none;font-family:'Nunito',sans-serif}
input[type=number]:focus{border-color:#30471F;box-shadow:0 0 0 2px rgba(48,71,31,.1)}
.hint{font-size:10px;color:#aaa;margin-top:2px}
.seg{display:flex;border:1.5px solid #d8d8d0;border-radius:8px;overflow:hidden;background:#F3F4F6}
.seg button{flex:1;padding:7px 4px;font-size:11px;font-weight:700;cursor:pointer;background:transparent;border:none;border-right:1px solid #e0dfd8;color:#888;transition:all .12s;font-family:'Nunito',sans-serif}
.seg button:last-child{border-right:none}
.seg button.on{background:#30471F;color:#fff}
.warn{background:#fffbec;border:1.5px solid #FFB300;border-radius:7px;padding:7px 10px;font-size:11px;color:#7a5800;margin-top:8px}
.cols{display:flex;gap:12px;align-items:flex-start}
.left-col{flex:1;min-width:0}
.right-col{width:260px;flex-shrink:0;position:sticky;top:10px}
@media(max-width:720px){.cols{flex-direction:column}.right-col{width:100%;position:static}.g2{grid-template-columns:1fr}.g3{grid-template-columns:1fr 1fr}}
.cat-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.cat-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#30471F}
.atag{font-size:10px;padding:1px 6px;border-radius:20px;background:#e6f0e0;color:#30471F;font-weight:700}
/* Service row: fixed-height controls on the right, name takes remaining space */
.svc{display:flex;align-items:flex-start;gap:7px;padding:7px 0;border-bottom:1px solid #f5f5f0;user-select:none;flex-wrap:wrap}
.svc:last-child{border-bottom:none}
.chk{width:16px;height:16px;border-radius:4px;border:1.5px solid #d8d8d0;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:#fff;transition:all .12s;margin-top:1px}
.chk.on{background:#30471F;border-color:#30471F}
.chk.dis{opacity:.3;cursor:not-allowed}
/* Name column: takes all remaining space, clips properly */
.svc-name-col{flex:1;min-width:0;overflow:hidden}
.svc-nm{font-size:12px;font-weight:700;color:#18240F;line-height:1.4;word-wrap:break-word}
.svc-nm.dim{color:#bbb}
.svc-tags{display:flex;align-items:center;flex-wrap:wrap;gap:3px;margin-top:2px}
.desc-txt{font-size:11px;color:#888;line-height:1.4;margin-top:4px}
/* Controls column: fixed width, right-aligned */
.svc-controls{display:flex;align-items:center;gap:4px;flex-shrink:0}
.pop{font-size:10px;padding:1px 6px;border-radius:20px;background:#FFB300;color:#18240F;font-weight:700;white-space:nowrap}
.req{font-size:10px;color:#bbb;font-weight:400;white-space:nowrap}
.pi{width:68px;font-size:12px;padding:5px 6px;border:1.5px solid #d8d8d0;border-radius:6px;text-align:right;background:#fafaf8;color:#18240F;font-family:'Nunito',sans-serif}
.pi.ovr{border-color:#FFB300;background:#fffbec}
.svc-mo{font-size:12px;color:#30471F;font-weight:700;white-space:nowrap;min-width:54px;text-align:center;padding:5px 6px;border:1.5px solid #d8e8d0;border-radius:6px;background:#f5f9f4;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s}
.svc-mo:hover{background:#e6f0e0;border-color:#30471F}
.svc-mo.copied{background:#30471F;color:#fff;border-color:#30471F}
.ovr-badge{display:flex;align-items:center;gap:2px}
.ovr-dot{font-size:9px;color:#FFB300;font-weight:700;white-space:nowrap}
.ovr-reset{font-size:9px;color:#aaa;cursor:pointer;text-decoration:underline;white-space:nowrap}
.ovr-reset:hover{color:#cc0000}
.exp-btn{font-size:11px;color:#aaa;cursor:pointer;padding:2px 5px;border-radius:4px;border:1px solid #e8e8e0;background:#fafaf8;white-space:nowrap;font-family:'Nunito',sans-serif;line-height:1}
.exp-btn:hover{background:#f0f0ea}
.auto-val{text-align:right;font-size:12px;min-width:68px}
.ref-section{margin-top:8px}
.ref-cat{margin-bottom:6px;border:1px solid #e8e8e0;border-radius:8px;overflow:hidden}
.ref-cat-hd{padding:7px 10px;background:#f5f9f4;font-size:11px;font-weight:700;color:#30471F;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.ref-cat-hd:hover{background:#e6f0e0}
.ref-cat-body{padding:6px 10px}
.ref-item{padding:4px 0;border-bottom:1px solid #f5f5f0}
.ref-item:last-child{border-bottom:none}
.ref-item-nm{font-size:11px;font-weight:700;color:#18240F}
.ref-item-desc{font-size:10px;color:#888;line-height:1.4;margin-top:1px}
.ref-sub-desc{font-size:10px;color:#5a7a50;line-height:1.4;margin:2px 0 4px;padding:0 10px}
.info-bar{padding:7px 9px;background:#F3F4F6;border-radius:7px;font-size:11px;margin-top:7px}
.empty{text-align:center;padding:16px 0;font-size:11px;color:#bbb}
.sm-hint{font-size:10px;color:#aaa;margin-top:6px;padding-top:6px;border-top:1px dashed #e8e8e0}
.addr-btn{padding:7px 12px;font-size:12px;font-weight:700;border:1.5px solid #d8d8d0;border-radius:7px;background:#fafaf8;color:#18240F;cursor:pointer;white-space:nowrap;font-family:'Nunito',sans-serif;transition:all .12s}
.addr-btn:hover{background:#e6f0e0;border-color:#30471F}
</style>
</head>
<body>
<div class="wrap">
<header>
  <div style="display:flex;align-items:center;gap:8px">
    <div class="logo"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
    <div><div class="h1t">Amigo Landscaping — Quote Builder</div><div class="sub">Property details → auto-price → select services</div></div>
  </div>
</header>

<div class="card">
  <div class="slbl">Property details</div>
  <div style="display:flex;gap:6px;align-items:flex-end;margin-bottom:10px;flex-wrap:wrap">
    <div style="flex:1;min-width:180px"><label class="lbl">Property address</label><input type="text" id="iAddr" placeholder="e.g. 123 Main St, Springfield, OH 45501" onkeydown="if(event.key==='Enter'){event.preventDefault();lookupAddr();}" style="width:100%;font-size:13px;padding:7px 9px;border:1.5px solid #d8d8d0;border-radius:7px;background:#fafaf8;color:#18240F;outline:none;font-family:'Nunito',sans-serif"></div>
    <button class="addr-btn" onclick="lookupAddr()" id="lkBtn">📍 Look up</button>
    <button class="addr-btn" onclick="openEarth()">🌍 Earth</button>
    <button class="addr-btn" onclick="openLotSearch()">🔍 Lot info</button>
  </div>
  <div id="mapBox" style="display:none;height:300px;border-radius:10px;overflow:hidden;border:1.5px solid #d8d8d0;margin-bottom:6px"></div>
  <div id="mapMeta" style="display:none;font-size:10px;color:#888;margin-bottom:10px;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap"><span id="mapAddr"></span><span style="color:#aaa">Use the layer toggle inside the map to switch between Map &amp; Satellite</span></div>
  <div class="g2" style="margin-bottom:12px">
    <div><label class="lbl">Lawn / turf (sq ft)</label><input type="number" id="iLn" placeholder="e.g. 8000" oninput="upd()"></div>
    <div><label class="lbl">Lot size (sq ft)</label><input type="number" id="iLt" placeholder="e.g. 10890" oninput="upd()"></div>
    <div><label class="lbl">Paved area — driveway + walks (sq ft)</label><input type="number" id="iPv" placeholder="e.g. 800" oninput="upd()"></div>
    <div><label class="lbl">Mulch — eyeball (yards)</label><input type="number" id="iMu" placeholder="e.g. 3" step="0.5" oninput="upd()"><div class="hint">Drives bed maintenance + mulch pricing</div></div>
    <div><label class="lbl">Bush trim time per visit (hrs)</label><input type="number" id="iTr" placeholder="e.g. 1.5" step="0.25" oninput="upd()"></div>
    <div><label class="lbl">Perennial pruning per session (hrs)</label><input type="number" id="iPe" placeholder="e.g. 0.5" step="0.25" oninput="upd()"></div>
  </div>
  <div class="g3">
    <div><label class="lbl" style="margin-bottom:5px">Man-hour rate</label>
      <div class="seg" id="rPg">
        <button class="on" onclick="setSeg('rPg',this,()=>ST.rate=80)">$80/hr</button>
        <button onclick="setSeg('rPg',this,()=>ST.rate=90)">$90/hr</button>
        <button onclick="setSeg('rPg',this,()=>ST.rate=100)">$100/hr</button>
      </div>
    </div>
    <div><label class="lbl" style="margin-bottom:5px">Leaf volume (0=none · 5=heavy)</label>
      <div class="seg" id="lPg">
        <button onclick="setSeg('lPg',this,()=>ST.leaf=0)">0</button>
        <button onclick="setSeg('lPg',this,()=>ST.leaf=1)">1</button>
        <button class="on" onclick="setSeg('lPg',this,()=>ST.leaf=2)">2</button>
        <button onclick="setSeg('lPg',this,()=>ST.leaf=3)">3</button>
        <button onclick="setSeg('lPg',this,()=>ST.leaf=4)">4</button>
        <button onclick="setSeg('lPg',this,()=>ST.leaf=5)">5</button>
      </div>
    </div>
    <div id="snowRow" style="display:none"><label class="lbl" style="margin-bottom:5px">Snow trigger</label>
      <div class="seg" id="snPg">
        <button class="on" onclick="setSeg('snPg',this,()=>ST.snow='2plus')">2&quot;+</button>
        <button onclick="setSeg('snPg',this,()=>ST.snow='1plus')">1&quot;+</button>
        <button onclick="setSeg('snPg',this,()=>ST.snow='zero')">Zero tolerance</button>
      </div>
    </div>
  </div>
  <div id="estW" style="display:none" class="warn">No lawn size — estimating turf at 70% of lot.</div>
</div>

<div class="mode-bar">
  <button class="mode-btn" id="mRec" onclick="setMode('recurring')">🌿 Property Plan (Recurring)</button>
  <button class="mode-btn" id="mOne" onclick="setMode('onetime')">🔧 One-Off Job</button>
</div>

<div class="cols">
  <div class="left-col" id="svcCol"></div>
  <div class="right-col" id="outCol"></div>
</div>
</div>

<script>
const $=id=>document.getElementById(id);
const V=35,BCB=100,BCR1=38,BCR2=26,BEB=200,BER1=60,BER2=40;
const SLM=[0.75,0.9,1.0,1.15,1.30,1.50];
let ST={lawn:0,lot:0,paved:0,mulch:0,trim:0,peren:0,rate:80,leaf:2,snow:'2plus',mode:null,sel:new Set(['A1']),selOne:new Set(),ov:{},ovOne:{},exp:new Set()};
function setMode(m){ST.mode=m;$('mRec').classList.toggle('on',m==='recurring');$('mOne').classList.toggle('on',m==='onetime');$('snowRow').style.display=m==='recurring'?'':'none';render();}
const MKT={A:{title:'🌿 Mowing Packages',desc:'Our weekly mowing packages provide consistent, professional care for your lawn throughout the entire growing season.'},C:{title:'🌸 Flower Bed Care & Mulch',desc:'Keep your landscape beds pristine all season long. Includes weeding plans, mulch installation, and bed edging.'},B:{title:'🌱 Lawn Health Services',desc:'Treatments designed to relieve soil compaction, improve nutrient uptake, and thicken your existing turf.'},D:{title:'🌱 Spring Cleanup (Spring Only)',desc:'Comprehensive spring property care designed to properly reset and prepare your landscape at the start of the season.'},G:{title:'🍂 Fall Leaf Care & Cleanups (Fall Only)',desc:'Comprehensive fall property care designed to manage falling leaves and prepare your landscape for winter.'},E:{title:'✂️ Trimming & Pruning',desc:'Professional shaping services to maintain neat, balanced bushes throughout the growing season.'},H:{title:'❄️ Winter Services',desc:'Reliable, 24/7 snow and ice management to keep your property safe and accessible all winter long.'},OB:{title:'🌱 Lawn Health',desc:'One-time aeration and overseeding treatments.'},OE:{title:'✂️ Trimming & Pruning',desc:'One-time shaping and pruning services.'},OF:{title:'🪵 Bed & Mulch Services',desc:'One-time bed care and mulch installation.'},OD:{title:'🧹 Property Cleanups',desc:'One-time spring or fall property cleanup.'}};
const DESCS={A1:'Weekly professional mowing of all turf areas during the growing season (35 visits, April–November). Using specialized mulching blades, grass clippings are finely shredded and returned to the lawn to naturally feed the soil. Includes string trimming around edges, obstacles, and beds, and blowing of hard surfaces.',A2:'Weekly professional mowing (35 visits). Grass clippings are bagged and removed for a consistently clean appearance. Includes string trimming, edges, obstacles, beds, and blowing of hard surfaces.',C1:'Routine maintenance of garden beds using string trimmers to control visible weed growth. Performed during regular weekly visits. Mechanical trim only — no hand pulling; root systems remain intact.',C2:'Ongoing hand-pulled weeding and light bed upkeep performed during regular weekly visits. Includes an application of Preen weed preventer.',B1:'Mechanical core aeration performed in spring to relieve soil compaction and improve air, water, and nutrient movement into the root zone.',B2:'Mechanical core aeration performed in fall to reduce compaction following the growing season.',B3:'Application of grass seed in spring to improve turf density. Intended to thicken existing turf — not designed to restore large bare areas.',B4:'Application of grass seed in fall to increase turf density and improve lawn thickness for the following season.',D1:'Seasonal cleanup in early spring to reset the property after winter. All organic material is finely shredded and returned to the soil.',D2:'Seasonal cleanup in early spring. All collected material is completely hauled away for a perfectly clean appearance.',G1:'Add-on to mowing plan. Leaves shredded and mulched into the turf during fall visits. Includes a deep end-of-season cleanup.',G2:'Add-on to mowing plan. Leaves collected and hauled away during every fall visit. Concludes with a comprehensive full-property final cleanup.',G3:'Add-on to mowing plan. Most comprehensive — leaves completely cleared from lawn, hardscapes, and all flower beds during every visit.',G4:'Single comprehensive cleanup. Leaves, sticks, and debris cleared. All organic material finely shredded and returned to the soil.',G5:'Single comprehensive cleanup. Leaves, sticks, and debris cleared. All collected material completely hauled away.',E1:'One professional trimming visit per year. Restores a neat, balanced shape. Ground level only — tree work not included.',E4:'Two professional trimming visits per year. Recommended for faster-growing landscapes. Ground level only.',E2:'Ongoing trimming support throughout the season as needed. Add-on to mowing plan. Ground level only.',E5:'Upgrades shaping services to include step ladders for taller bushes. Tree work remains excluded.',E3:'Seasonal pruning of perennial flowers at appropriate times. Does not include bush or tree trimming.',F1:'Delivery and installation of dark brown mulch in flower beds. Includes natural edge-defining and complimentary Preen weed preventer. $150/yard.',H1:'24/7 snow clearing triggered after ~2 inches. Unlimited visits for qualifying events.',H2:'Priority 24/7 snow clearing triggered after ~1 inch. Earlier dispatch and priority scheduling.',H4:'Highest priority 24/7 snow clearing at any accumulation. Property remains completely clear at all times.',H3:'Application of salt to walkways and driveways following snow removal.',OB1:'One-time mechanical core aeration in spring. Relieves soil compaction, improves air, water, and nutrient movement.',OB2:'One-time mechanical core aeration in fall. Reduces compaction following the growing season.',OB3:'One-time application of grass seed in spring to improve turf density.',OB4:'One-time application of grass seed in fall to increase turf density for the following season.',OE1:'One-time professional trimming for bushes and shrubs. Restores a neat, balanced shape. Ground level only.',OE3:'One-time pruning of perennial flowers at appropriate times.',OF1:'Delivery and installation of dark brown mulch in flower beds. Includes bed edging and complimentary Preen weed preventer. $150/yard.',OF2:'One-time comprehensive hand-pulled weeding of flower beds.',OF3:'One-time bed reset — clearing, edging, and bringing beds back to a maintainable baseline before ongoing service can begin.',OD1:'One-time spring property cleanup. Clears leaves, sticks, and debris. Organic material mulched and returned to the soil.',OD2:'One-time spring property cleanup. All material hauled away.',OD3:'One-time fall cleanup. Single comprehensive leaf clearing visit. Organic material mulched back.',OD4:'One-time fall cleanup. All material hauled away.'};
const REC_CATS=[{id:'A',items:[{id:'A1',name:'Weekly Maintenance – Nutrient Standard',pop:true},{id:'A2',name:'Weekly Maintenance – Pristine Standard',auto:true}]},{id:'C',addon:'add-on to mowing',items:[{id:'C1',name:'Garden Maintenance – Clean Look Plan',pop:true,dep:true},{id:'C2',name:'Garden Maintenance – Estate Detail Plan',dep:true},{id:'F1',name:'Mulch Installation & Flower Bed Edging'}]},{id:'B',items:[{id:'B1',name:'Spring Aeration'},{id:'B2',name:'Fall Aeration'},{id:'B3',name:'Spring Overseeding'},{id:'B4',name:'Fall Overseeding'}]},{id:'D',items:[{id:'D1',name:'Spring Cleanup – Nutrient Standard',pop:true},{id:'D2',name:'Spring Cleanup – Pristine Standard'}]},{id:'G',addon:'add-on to mowing',items:[{id:'G1',name:'Leaf Care – Standard',pop:true,dep:true},{id:'G2',name:'Leaf Care – Pristine',dep:true},{id:'G3',name:'Leaf Care – Estate',dep:true},{id:'G4',name:'One-Time Cleanup – Nutrient Standard',pop:true},{id:'G5',name:'One-Time Cleanup – Pristine Standard'}]},{id:'E',items:[{id:'E1',name:'Annual Shaping'},{id:'E4',name:'Bi-Annual Shaping'},{id:'E2',name:'Premium Managed Shaping',dep:true},{id:'E5',name:'Ladder Use Upgrade'},{id:'E3',name:'Perennial Flower Pruning'}]},{id:'H',items:[{id:'H1',name:'Snow Removal – Standard'},{id:'H2',name:'Snow Removal – Premium'},{id:'H4',name:'Snow Removal – Zero Tolerance'},{id:'H3',name:'Salt Treatment'}]}];
const ONE_CATS=[{id:'OB',items:[{id:'OB1',name:'Spring Aeration'},{id:'OB2',name:'Fall Aeration'},{id:'OB3',name:'Spring Overseeding'},{id:'OB4',name:'Fall Overseeding'}]},{id:'OD',items:[{id:'OD1',name:'Spring Cleanup – Nutrient Standard',pop:true},{id:'OD2',name:'Spring Cleanup – Pristine Standard'},{id:'OD3',name:'Fall Cleanup – Nutrient Standard',pop:true},{id:'OD4',name:'Fall Cleanup – Pristine Standard'}]},{id:'OE',items:[{id:'OE1',name:'Bush & Shrub Shaping'},{id:'OE3',name:'Perennial Flower Pruning'}]},{id:'OF',items:[{id:'OF1',name:'Mulch Installation & Flower Bed Edging',pop:true},{id:'OF2',name:'One-Time Weeding'},{id:'OF3',name:'Bed Reset / Garden Cleanup'}]}];
const MDEPS=['C1','C2','G1','G2','G3','E2'];
function isMow(){return ST.sel.has('A1')||ST.sel.has('A2')}
function hasTrim(){const s=ST.mode==='recurring'?ST.sel:ST.selOne;return s.has('E1')||s.has('E4')||s.has('E2');}
function bp(y,b,r1,r2){return b+Math.min(y,8)*r1+Math.max(y-8,0)*r2;}
function getSug(){let{paved,mulch,trim,peren,rate,leaf,snow}=ST;let lawn=ST.lawn,lot=ST.lot;if(!lawn&&lot)lawn=lot*0.7;let mc=0;if(lawn>0){if(lawn<=5000)mc=40;else if(lawn<=10000)mc=40+(lawn-5000)*0.0019;else if(lawn<=20000)mc=49.5+(lawn-10000)*0.0015;else mc=64.5+(lawn-20000)*0.0012;}const mY=Math.round(mc*V);const c1=mulch>0?Math.round(bp(mulch,BCB,BCR1,BCR2)):mc>0?Math.round(mc*3):0;const c2=mulch>0?Math.round(bp(mulch,BEB,BER1,BER2)):mc>0?Math.round(mc*5):0;let fb=0;if(lot>0&&leaf>0){const b=lot<=10000?275:lot<=20000?275+(lot-10000)*0.011:lot<=43560?385+(lot-20000)*0.007:550+(lot-43560)*0.006;fb=b*(1+[0,0,0.25,0.5,0.8,1.2][leaf]);}const scBase=lot>0?(lot<=10000?200:lot<=20000?200+(lot-10000)*0.008:lot<=43560?280+(lot-20000)*0.005:420+(lot-43560)*0.004):0;const sc=Math.round(scBase*SLM[leaf]);let snb=paved>0?(paved<=600?695:695+(paved-600)*0.27):0;if(snow==='1plus')snb*=1.4;if(snow==='zero')snb*=2.0;const mR=mc>0?Math.round(mc*3.5):0;const os=mc>0&&lawn>0?Math.round(mc+lawn*0.02):0;const mu=mulch>0?Math.round(mulch*150):0;return{A1:mY,A2:Math.round(mY*1.25),C1:c1,C2:c2,B1:mR,B2:mR,B3:os,B4:os,D1:sc,D2:Math.round(sc*1.2),G1:Math.round(fb),G2:Math.round(fb*1.35),G3:Math.round(fb*1.7),G4:Math.round(fb*0.65),G5:Math.round(fb*0.65*1.2),E1:trim>0?Math.round(trim*rate):0,E4:trim>0?Math.round(trim*rate*2):0,E2:trim>0?Math.round(trim*rate*1.35):0,E5:trim>0?Math.round(trim*rate*0.3):0,E3:peren>0?Math.round(peren*rate*2):0,F1:mu,H1:Math.round(snb),H2:Math.round(snb),H4:Math.round(snb),H3:paved>0?Math.round(100+(paved>600?(paved-600)*0.05:0)):0,OB1:mR,OB2:mR,OB3:os,OB4:os,OD1:sc,OD2:Math.round(sc*1.2),OD3:Math.round(fb*0.65),OD4:Math.round(fb*0.65*1.2),OE1:trim>0?Math.round(trim*rate):0,OE3:peren>0?Math.round(peren*rate):0,OF1:mu,OF2:trim>0?Math.round(trim*rate*0.5):0,OF3:mulch>0?Math.round(mulch*rate*0.4):mc>0?Math.round(mc*2):0};}
function getSel(){return ST.mode==='recurring'?ST.sel:ST.selOne;}
function getOv(){return ST.mode==='recurring'?ST.ov:ST.ovOne;}
function getCats(){return ST.mode==='recurring'?REC_CATS:ONE_CATS;}
function gp(id){const ov=getOv();if(id==='A2'){const b='A1'in ST.ov?ST.ov.A1:(getSug().A1||0);return Math.round(b*1.25);}return id in ov?ov[id]:(getSug()[id]||0);}
function toggle(id,cid){const sel=getSel();const isRec=ST.mode==='recurring';if(isRec&&MDEPS.includes(id)&&!isMow())return;if(id==='E5'&&!hasTrim())return;if(sel.has(id)){sel.delete(id);if(isRec&&cid==='A'&&!isMow())MDEPS.forEach(d=>sel.delete(d));if(cid==='E'&&!sel.has('E1')&&!sel.has('E4')&&!sel.has('E2'))sel.delete('E5');}else sel.add(id);render();}
function toggleExp(id){ST.exp.has(id)?ST.exp.delete(id):ST.exp.add(id);render();}
function setSeg(gid,btn,fn){document.querySelectorAll('#'+gid+' button').forEach(b=>b.classList.remove('on'));btn.classList.add('on');fn();render();}
let _rT;function scheduleRender(){clearTimeout(_rT);_rT=setTimeout(render,120);}
function upd(){ST.lawn=parseFloat($('iLn').value)||0;ST.lot=parseFloat($('iLt').value)||0;ST.paved=parseFloat($('iPv').value)||0;ST.mulch=parseFloat($('iMu').value)||0;ST.trim=parseFloat($('iTr').value)||0;ST.peren=parseFloat($('iPe').value)||0;scheduleRender();}
function ovr(id,val){const ov=getOv();const n=parseFloat(val);if(isNaN(n)||val==='')delete ov[id];else ov[id]=n;scheduleRender();}
function resetOvr(id,e){e.stopPropagation();const ov=getOv();delete ov[id];render();}
function getAddr(){return ($('iAddr').value||'').trim();}
function openEarth(){const a=getAddr();if(!a)return;window.open('https://earth.google.com/web/search/'+encodeURIComponent(a),'_blank');}
function openLotSearch(){const a=getAddr();if(!a)return;window.open('https://www.google.com/search?q='+encodeURIComponent(a+' Zillow OR Realtor OR Redfin lot size'),'_blank');}
function lookupAddr(){
  const a=getAddr();if(!a)return;
  const box=$('mapBox'),meta=$('mapMeta');
  const url='https://maps.google.com/maps?q='+encodeURIComponent(a)+'&t=k&z=19&output=embed';
  box.innerHTML='<iframe width="100%" height="100%" frameborder="0" style="border:0;display:block" loading="lazy" referrerpolicy="no-referrer-when-downgrade" src="'+url+'"></iframe>';
  box.style.display='block';meta.style.display='flex';
  $('mapAddr').textContent=a;
}
function cp(t,btn){navigator.clipboard.writeText(t).then(()=>{if(btn){const o=btn.textContent;btn.textContent='✓';setTimeout(()=>btn.textContent=o,1400);}}).catch(()=>{});}
function cpMo(val,el){if(!val)return;navigator.clipboard.writeText(String(val)).then(()=>{el.classList.add('copied');const o=el.textContent;el.textContent='✓ Copied';setTimeout(()=>{el.textContent=o;el.classList.remove('copied');},1400);}).catch(()=>{});}
function renderSvc(){
  const ae=document.activeElement;const focusId=ae&&ae.dataset&&ae.dataset.id?ae.dataset.id:null;
  let cursorPos=0;if(focusId){try{cursorPos=ae.selectionStart||0;}catch(e){}}
  const sug=getSug();const sel=getSel();const isRec=ST.mode==='recurring';
  let h='';
  for(const cat of getCats()){
    const m=MKT[cat.id];
    h+='<div class="card"><div class="cat-hd"><div class="cat-title">'+(m?m.title:cat.id)+'</div>'+(cat.addon?'<span class="atag">'+cat.addon+'</span>':'')+'</div>';
    for(const item of cat.items){
      const selected=sel.has(item.id);
      const disMow=isRec&&MDEPS.includes(item.id)&&!isMow();
      const disTrim=item.id==='E5'&&!hasTrim();
      const dis=disMow||disTrim;
      const p=gp(item.id);const sp=sug[item.id]||0;const isExp=ST.exp.has(item.id);
      const chk=selected&&!dis?'<svg width="10" height="10" viewBox="0 0 12 12"><polyline points="1,6.5 4.5,10 11,2" stroke="white" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>':'';
      h+='<div class="svc"><div class="chk '+(selected&&!dis?'on':'')+(dis?' dis':'')+'" style="'+(dis?'':'cursor:pointer')+'" onclick="'+(dis?'':'toggle(\''+item.id+'\',\''+cat.id+'\')')+'">'+chk+'</div>';
      h+='<div class="svc-name-col"><div class="svc-nm'+(dis?' dim':'')+'">'+item.name+'</div>';
      if(item.pop||dis){h+='<div class="svc-tags">'+(item.pop?'<span class="pop">Popular</span>':'')+(disTrim?'<span class="req">· requires a trimming service</span>':'')+(disMow?'<span class="req">· requires mowing plan</span>':'')+'</div>';}
      if(isExp)h+='<div class="desc-txt">'+(DESCS[item.id]||'')+'</div>';
      h+='</div>';
      const ov=getOv();const isOvr=item.id in ov;
      const mo=isRec&&p>0?Math.round(p/12):0;
      h+='<div class="svc-controls"><button class="exp-btn" onclick="toggleExp(\''+item.id+'\')">'+(isExp?'▲':'▼')+'</button>';
      if(item.auto){h+='<div class="auto-val"><div style="font-weight:700;color:#30471F">$'+Math.round(p).toLocaleString()+'</div><div style="font-size:10px;color:#aaa">+25% auto</div></div>';}
      else{h+='<input class="pi'+(isOvr?' ovr':'')+'" type="number" data-id="'+item.id+'" value="'+(p>0?Math.round(p):'')+'" placeholder="'+(sp>0?Math.round(sp):'—')+'" oninput="ovr(\''+item.id+'\',this.value)">';}
      if(isRec&&!item.auto)h+='<div class="svc-mo" onclick="event.stopPropagation();cpMo('+mo+',this)">'+(mo>0?'$'+mo+'/mo':'')+'</div>';
      h+='</div>';
      if(isOvr&&!item.auto)h+='<div class="ovr-badge" style="width:100%;justify-content:flex-end;margin-top:-2px;padding-right:2px"><span class="ovr-dot">edited</span><span class="ovr-reset" onclick="resetOvr(\''+item.id+'\',event)">reset</span></div>';
      h+='</div>';
    }
    if(cat.id==='C'&&ST.mulch>0)h+='<div class="sm-hint">Clean Look = $'+BCB+' + $'+BCR1+'/yd (first 8) + $'+BCR2+'/yd beyond · Estate = $'+BEB+' + $'+BER1+'/yd + $'+BER2+'/yd beyond · '+ST.mulch+' yds</div>';
    if(cat.id==='D')h+='<div class="sm-hint">Spring cleanup scales with leaf volume — leaf '+ST.leaf+' → ×'+SLM[ST.leaf]+'</div>';
    h+='</div>';
  }
  $('svcCol').innerHTML=h;
  if(focusId){const el=document.querySelector('.pi[data-id="'+focusId+'"]');if(el){el.focus();try{el.setSelectionRange(cursorPos,cursorPos);}catch(e){}}}
}
function renderOut(){const isRec=ST.mode==='recurring';let h='<div class="card" style="margin-bottom:10px">';if(isRec){const trimSel=['E1','E4','E2'].filter(id=>ST.sel.has(id));if(trimSel.length&&ST.trim>0){const vM={E1:1,E4:2,E2:6};let tT=0,tH=0;trimSel.forEach(id=>{tT+=gp(id);tH+=ST.trim*(vM[id]||1);});const ir=tH>0?Math.round(tT/tH):0,ok=Math.abs(ir-ST.rate)<10,lo=ir<ST.rate-10;const cl=ok?'#30471F':lo?'#cc0000':'#7a5800';h+='<div class="info-bar"><span style="color:#888">Trim rate: </span><span style="font-weight:700;color:'+cl+'">$'+ir+'/hr · '+(lo?'below target':ok?'on target':'above target')+'</span><span style="color:#888"> (target $'+ST.rate+'/hr)</span></div>';}}if(ST.mulch>0&&(ST.sel.has('F1')||ST.selOne.has('OF1'))){const id=isRec?'F1':'OF1';const p=gp(id);const cost=Math.round(ST.mulch*30);const margin=p-cost;h+='<div class="info-bar"><span style="color:#888">Mulch: </span><span style="font-weight:700">$'+Math.round(p).toLocaleString()+'</span><span style="color:#888"> · $'+cost+' material · </span><span style="color:#30471F;font-weight:700">$'+margin+' margin</span></div>';}h+='</div>';h+=renderRef();$('outCol').innerHTML=h;}
let refOpen=new Set();
function toggleRef(cid,e){e.stopPropagation();refOpen.has(cid)?refOpen.delete(cid):refOpen.add(cid);render();}
function renderRef(){let h='<div class="card ref-section"><div class="slbl">Reference — Line Items & Subtitles</div>';const cats=getCats();for(const cat of cats){const m=MKT[cat.id];const open=refOpen.has(cat.id);h+='<div class="ref-cat"><div class="ref-cat-hd" onclick="toggleRef(\''+cat.id+'\',event)"><span>'+(m?m.title:cat.id)+'</span><span style="font-size:10px;color:#aaa">'+(open?'▲':'▼')+'</span></div>';if(open){if(m)h+='<div class="ref-sub-desc">'+m.desc+'</div>';h+='<div class="ref-cat-body">';for(const item of cat.items){h+='<div class="ref-item"><div class="ref-item-nm">'+item.name+'</div><div class="ref-item-desc">'+(DESCS[item.id]||'')+'</div></div>';}h+='</div>';}h+='</div>';}h+='</div>';return h;}
function render(){$('estW').style.display=(!ST.lawn&&ST.lot)?'block':'none';if(!ST.mode){$('svcCol').innerHTML='<div class="card"><div class="empty" style="padding:28px 16px;font-size:12px;color:#888;line-height:1.6">Fill in the property details above, then choose <b style="color:#30471F">Property Plan</b> or <b style="color:#30471F">One-Off Job</b> to see pricing.</div></div>';$('outCol').innerHTML='';return;}renderSvc();renderOut();}
render();
</script>
