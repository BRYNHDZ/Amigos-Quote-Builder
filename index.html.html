<script>

const VISITS=35,BED_CLEAN_BASE=100,BED_CLEAN_R1=38,BED_CLEAN_R2=26,BED_EST_BASE=200,BED_EST_R1=60,BED_EST_R2=40;
let ST={lawn:0,lot:0,paved:0,mulch:0,trim:0,peren:0,rate:80,leaf:2,snow:'2plus',sel:new Set(['A1']),ov:{}};
const DESCS={A1:'Weekly professional mowing of all turf areas during the growing season (35 visits, April\\u2013November). Using specialized mulching blades, grass clippings are finely shredded and returned to the lawn to naturally feed the soil. Includes string trimming around edges, obstacles, and beds, and blowing of hard surfaces.',A2:'Weekly professional mowing of all turf areas during the growing season (35 visits, April\\u2013November). Grass clippings are bagged and removed for a consistently clean appearance. Includes string trimming around edges, obstacles, and beds, and blowing of hard surfaces.',C1:'Routine maintenance of garden beds using string trimmers to control visible weed growth and maintain a neat appearance. Performed during regular weekly visits. Mechanical trim only \\u2014 no hand pulling; root systems remain intact.',C2:'Ongoing hand-pulled weeding and light bed upkeep performed during regular weekly visits. Includes an application of Preen weed preventer to prevent new weeds from sprouting.',B1:'Mechanical core aeration of turf areas performed in spring to relieve soil compaction and improve air, water, and nutrient movement into the root zone.',B2:'Mechanical core aeration of turf areas performed in fall to reduce compaction following the growing season and support root health heading into winter.',B3:'Application of grass seed in spring to improve turf density and strengthen existing lawn coverage. Intended to thicken existing turf \\u2014 not designed to restore large bare or damaged areas.',B4:'Application of grass seed in fall to increase turf density and improve lawn thickness for the following season.',D1:'Seasonal cleanup performed in early spring to reset the property after winter. All organic material is finely shredded and returned to the soil to recycle nutrients naturally.',D2:'Seasonal cleanup performed in early spring to reset the property after winter. All collected material is completely hauled away for a perfectly clean appearance.',G1:'Add-on to your weekly mowing plan. During fall visits, leaves are shredded and mulched into the turf. Includes a deep end-of-season cleanup to clear excess leaf cover from the lawn, hardscapes, and garden beds.',G2:'Add-on to your weekly mowing plan. Leaves are actively collected and hauled away from the lawn and hardscapes during every fall visit. Season concludes with a comprehensive full-property final cleanup.',G3:'Add-on to your weekly mowing plan. Our most comprehensive leaf service \\u2014 leaves are completely cleared from the lawn, hardscapes, and all flower beds during every fall visit, with all material hauled away.',G4:'A single, comprehensive property cleanup. Leaves, sticks, and debris cleared from lawn and flower beds. All organic material finely shredded and returned to the soil.',G5:'A single, comprehensive property cleanup. Leaves, sticks, and debris cleared from lawn and flower beds. All collected material completely hauled away.',E1:'One professional trimming visit per year for bushes. Trimming focuses on restoring a neat, balanced shape. Performed with handheld tools from ground level only. Tree work not included.',E4:'Two professional trimming visits per year for bushes. Recommended for faster-growing landscapes. Performed with handheld tools from ground level only. Tree work not included.',E2:'Ongoing trimming support throughout the season performed as needed when growth becomes excessive. Add-on to your weekly mowing plan. Trimming limited to bushes from ground level.',E5:'Upgrades shaping services to include use of step ladders for taller bushes. Tree canopy work and large tree pruning remain excluded.',E3:'Seasonal pruning of perennial flowers performed at appropriate times to maintain plant health and appearance. Does not include bush or tree trimming.',F1:'Delivery and installation of dark brown mulch in flower beds. Includes natural edge-defining between lawn and flower beds as needed. Complimentary application of Preen weed preventer baked into the price. Priced at $150/yard.',H1:'24/7 snow clearing triggered after approximately 2 inches of accumulation. Unlimited visits for qualifying events. Covers designated driveways and walkways.',H2:'Priority 24/7 snow clearing triggered after approximately 1 inch of accumulation. Unlimited visits with earlier dispatch and priority scheduling.',H4:'Highest priority 24/7 snow clearing triggered at any accumulation. Unlimited visits \\u2014 property remains completely clear at all times.',H3:'Application of salt to walkways and driveways following snow removal to improve traction and reduce icing.'};
const CATS=[{id:'A',title:'Recurring lawn maintenance',items:[{id:'A1',name:'Weekly Lawn Maintenance \\u2013 Nutrient Standard',pop:true},{id:'A2',name:'Weekly Lawn Maintenance \\u2013 Pristine Standard',auto:true}]},{id:'C',title:'Garden bed maintenance',addon:'add-on to mowing',items:[{id:'C1',name:'Garden Maintenance \\u2013 Clean Look Plan',pop:true,dep:true},{id:'C2',name:'Garden Maintenance \\u2013 Estate Detail Plan',dep:true}]},{id:'B',title:'Lawn health services',items:[{id:'B1',name:'Spring Aeration'},{id:'B2',name:'Fall Aeration'},{id:'B3',name:'Spring Overseeding'},{id:'B4',name:'Fall Overseeding'}]},{id:'D',title:'Spring cleanups',items:[{id:'D1',name:'Spring Cleanup \\u2013 Nutrient Standard',pop:true},{id:'D2',name:'Spring Cleanup \\u2013 Pristine Standard'}]},{id:'G',title:'Fall leaf care',addon:'add-on to mowing',items:[{id:'G1',name:'Leaf Care \\u2013 Standard',pop:true,dep:true},{id:'G2',name:'Leaf Care \\u2013 Pristine',dep:true},{id:'G3',name:'Leaf Care \\u2013 Estate',dep:true},{id:'G4',name:'One-Time Cleanup \\u2013 Nutrient Standard',pop:true},{id:'G5',name:'One-Time Cleanup \\u2013 Pristine Standard'}]},{id:'E',title:'Trimming & pruning',items:[{id:'E1',name:'Annual Shaping'},{id:'E4',name:'Bi-Annual Shaping'},{id:'E2',name:'Premium Managed Shaping',dep:true},{id:'E5',name:'Ladder Use Upgrade'},{id:'E3',name:'Perennial Flower Pruning'}]},{id:'F',title:'Mulch services',items:[{id:'F1',name:'Mulch Installation & Flower Bed Edging'}]},{id:'H',title:'Winter / snow services',items:[{id:'H1',name:'Snow Removal \\u2013 Standard'},{id:'H2',name:'Snow Removal \\u2013 Premium'},{id:'H4',name:'Snow Removal \\u2013 Zero Tolerance'},{id:'H3',name:'Salt Treatment'}]}];
const MDEPS=['C1','C2','G1','G2','G3','E2'];
function isMow(){return ST.sel.has('A1')||ST.sel.has('A2')}
function bedPrice(y,base,r1,r2){return base+Math.min(y,8)*r1+Math.max(y-8,0)*r2;}
function getSug(){let{paved,mulch,trim,peren,rate,leaf,snow}=ST;let lawn=ST.lawn,lot=ST.lot;if(!lawn&&lot)lawn=lot*0.7;let mc=0;if(lawn>0){if(lawn<=5000)mc=40;else if(lawn<=10000)mc=40+(lawn-5000)*0.0019;else if(lawn<=20000)mc=49.5+(lawn-10000)*0.0015;else mc=64.5+(lawn-20000)*0.0012;}const mowY=Math.round(mc*VISITS);const c1=mulch>0?Math.round(bedPrice(mulch,BED_CLEAN_BASE,BED_CLEAN_R1,BED_CLEAN_R2)):mc>0?Math.round(mc*3):0;const c2=mulch>0?Math.round(bedPrice(mulch,BED_EST_BASE,BED_EST_R1,BED_EST_R2)):mc>0?Math.round(mc*5):0;let fb=0;if(lot>0&&leaf>0){const b=lot<=10000?275:lot<=20000?275+(lot-10000)*0.011:lot<=43560?385+(lot-20000)*0.007:550+(lot-43560)*0.006;fb=b*(1+[0,0,0.25,0.5,0.8,1.2][leaf]);}const sc=lot>0?(lot<=10000?200:lot<=20000?200+(lot-10000)*0.008:lot<=43560?280+(lot-20000)*0.005:420+(lot-43560)*0.004):0;let snb=paved>0?(paved<=600?695:695+(paved-600)*0.27):0;if(snow==='1plus')snb*=1.4;if(snow==='zero')snb*=2.0;return{A1:mowY,A2:Math.round(mowY*1.25),C1:c1,C2:c2,B1:mc>0?Math.round(mc*3.5):0,B2:mc>0?Math.round(mc*3.5):0,B3:mc>0&&lawn>0?Math.round(mc+lawn*0.02):0,B4:mc>0&&lawn>0?Math.round(mc+lawn*0.02):0,D1:Math.round(sc),D2:Math.round(sc*1.2),G1:Math.round(fb),G2:Math.round(fb*1.35),G3:Math.round(fb*1.7),G4:Math.round(fb*0.65),G5:Math.round(fb*0.65*1.2),E1:trim>0?Math.round(trim*rate):0,E4:trim>0?Math.round(trim*rate*2):0,E2:trim>0?Math.round(trim*rate*6):0,E5:trim>0?Math.round(trim*rate*0.3):0,E3:peren>0?Math.round(peren*rate*2):0,F1:mulch>0?Math.round(mulch*150):0,H1:Math.round(snb),H2:Math.round(snb),H4:Math.round(snb),H3:paved>0?Math.round(100+(paved>600?(paved-600)*0.05:0)):0};}
function gp(id){if(id==='A2'){const b='A1'in ST.ov?ST.ov.A1:(getSug().A1||0);return Math.round(b*1.25);}return id in ST.ov?ST.ov[id]:(getSug()[id]||0);}
function tot(){let s=0;ST.sel.forEach(id=>s+=gp(id));return s;}
function toggle(id,cid){if(MDEPS.includes(id)&&!isMow())return;if(ST.sel.has(id)){ST.sel.delete(id);if(cid==='A'&&!isMow())MDEPS.forEach(d=>ST.sel.delete(d));}else ST.sel.add(id);render();}
function setBtn(gid,btn,fn){document.querySelectorAll('#'+gid+' button').forEach(b=>b.classList.remove('on'));btn.classList.add('on');fn();render();}
function upd(){ST.lawn=parseFloat($('iLn').value)||0;ST.lot=parseFloat($('iLt').value)||0;ST.paved=parseFloat($('iPv').value)||0;ST.mulch=parseFloat($('iMu').value)||0;ST.trim=parseFloat($('iTr').value)||0;ST.peren=parseFloat($('iPe').value)||0;render();}
function ovr(id,val){const n=parseFloat(val);if(isNaN(n)||val==='')delete ST.ov[id];else ST.ov[id]=n;renderOut();}
function cpText(t,btn){navigator.clipboard.writeText(t).then(()=>{if(btn){const o=btn.textContent;btn.textContent='Copied';setTimeout(()=>btn.textContent=o,1500);}}).catch(()=>{});}
function cpItem(id,what,btn){let t='';for(const cat of CATS){const item=cat.items.find(i=>i.id===id);if(item){const mo=Math.round(gp(id)/12);if(what==='n')t=item.name;else if(what==='d')t=DESCS[id]||'';else t=item.name+'\\n'+(DESCS[id]||'')+'\\n\\n$'+mo+'/month';break;}}cpText(t,btn);}
function cpAll(btn){const lines=[];for(const cat of CATS){const sel=cat.items.filter(i=>ST.sel.has(i.id));if(!sel.length)continue;lines.push(cat.title.toUpperCase());lines.push('');sel.forEach(item=>{lines.push(item.name);lines.push(DESCS[item.id]||'');lines.push('$'+Math.round(gp(item.id)/12)+'/month');lines.push('');});}const t=tot();if(t>0){lines.push('---');lines.push('Annual total: $'+Math.round(t).toLocaleString());lines.push('Monthly (12-mo): $'+Math.round(t/12).toLocaleString());}cpText(lines.join('\\n'),btn);}
function renderSvc(){const sug=getSug();let h='';for(const cat of CATS){h+='<div class="card"><div style="display:flex;align-items:center;margin-bottom:11px"><div class="sec-label" style="margin:0">'+cat.title+'</div>'+(cat.addon?'<span class="atag">'+cat.addon+'</span>':'')+'</div>';for(const item of cat.items){const sel=ST.sel.has(item.id),dis=MDEPS.includes(item.id)&&!isMow();const p=gp(item.id),sp=sug[item.id]||0;const chk=sel&&!dis?'<svg width="11" height="11" viewBox="0 0 12 12"><polyline points="1,6.5 4.5,10 11,2" stroke="#18240F" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>':'';h+='<div class="svc-row" onclick="'+(dis?'':' toggle(\\''+item.id+'\\',\\''+cat.id+'\\')' )+'" style="'+(dis?'cursor:default':'')+'"><div class="chk '+(sel&&!dis?'on':'')+(dis?' dis':'')+'">'+chk+'</div><div class="svc-name'+(dis?' dim':'')+'">'+item.name+(item.pop?'<span class="pop">Popular</span>':'')+(dis?'<span style="font-size:10px;color:#bbb"> &middot; requires mowing plan</span>':'')+'</div>';if(item.auto){h+='<div style="text-align:right;font-size:13px;min-width:80px"><div style="font-weight:700;font-family:Fredoka,sans-serif">$'+Math.round(p).toLocaleString()+'</div><div style="font-size:10px;color:#888">+25% auto</div></div>';}else{h+='<input class="pi" type="number" value="'+(p>0?Math.round(p):'')+'" placeholder="'+(sp>0?Math.round(sp):'0')+'" onclick="event.stopPropagation()" oninput="event.stopPropagation();ovr(\\''+item.id+'\\',this.value)">';}h+='</div>';}if(cat.id==='C'&&ST.mulch>0){h+='<div class="hint" style="margin-top:7px;padding-top:7px;border-top:1px solid #f0f0ea">Clean Look = $'+BED_CLEAN_BASE+' + $'+BED_CLEAN_R1+'/yd (first 8) + $'+BED_CLEAN_R2+'/yd beyond &nbsp;&middot;&nbsp; Estate = $'+BED_EST_BASE+' + $'+BED_EST_R1+'/yd + $'+BED_EST_R2+'/yd beyond &nbsp;&middot;&nbsp; '+ST.mulch+' yds entered</div>';}h+='</div>';}$('svcCol').innerHTML=h;}
function renderOut(){const t=tot();let h='<div class="card" style="margin-bottom:12px"><div class="sec-label">Summary</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px"><div class="met"><div class="met-l">Annual total</div><div class="met-v">'+(t>0?'$'+Math.round(t).toLocaleString():'&mdash;')+'</div></div><div class="met"><div class="met-l">Monthly (&divide;12)</div><div class="met-v">'+(t>0?'$'+Math.round(t/12).toLocaleString():'&mdash;')+'</div></div></div>';const trimSel=['E1','E4','E2'].filter(id=>ST.sel.has(id));if(trimSel.length&&ST.trim>0){const vMap={E1:1,E4:2,E2:6};let tT=0,tH=0;trimSel.forEach(id=>{tT+=gp(id);tH+=ST.trim*(vMap[id]||1);});const ir=tH>0?Math.round(tT/tH):0;const ok=Math.abs(ir-ST.rate)<10,lo=ir<ST.rate-10;const cl=ok?'#30471F':lo?'#cc0000':'#7a5800';h+='<div class="check-info"><span style="color:#888">Trim rate check: </span><span style="font-weight:700;color:'+cl+'">$'+ir+'/hr &middot; '+(lo?'below target':ok?'on target':'above target')+'</span><span style="color:#888"> (target $'+ST.rate+'/hr)</span></div>';}if(ST.mulch>0&&ST.sel.has('F1')){const p=gp('F1'),cost=Math.round(ST.mulch*30),margin=p-cost;h+='<div class="check-info"><span style="color:#888">Mulch: </span><span style="font-weight:700">$'+Math.round(p).toLocaleString()+'</span><span style="color:#888"> &middot; $'+cost+' material &middot; </span><span style="color:#30471F;font-weight:700">$'+margin+' margin</span></div>';}h+='<button class="cp-btn" onclick="cpAll(this)">Copy all line items</button></div>';h+='<div class="card"><div class="sec-label">Jobber line items</div>';let any=false;for(const cat of CATS){const sel=cat.items.filter(i=>ST.sel.has(i.id));if(!sel.length)continue;any=true;h+='<div class="qhd">'+cat.title+'</div>';sel.forEach(item=>{const p=gp(item.id);h+='<div class="qi"><div class="qi-name">'+item.name+'</div><div class="qi-desc">'+(DESCS[item.id]||'')+'</div><div class="qi-price">$'+Math.round(p/12)+'/month</div><div class="qi-btns"><button class="qi-btn" onclick="cpItem(\\''+item.id+'\\',\\'n\\',this)">Name</button><button class="qi-btn" onclick="cpItem(\\''+item.id+'\\',\\'d\\',this)">Desc</button><button class="qi-btn g" onclick="cpItem(\\''+item.id+'\\',\\'a\\',this)">All</button></div></div>';});}if(!any)h+='<div class="empty">Select services to see line items</div>';h+='</div>';$('outCol').innerHTML=h;}
